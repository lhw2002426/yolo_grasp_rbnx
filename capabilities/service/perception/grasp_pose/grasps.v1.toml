# Stream of grasp poses, published every time a grasp_request is
# served (1 message per call). Subscribers see the same data they'd
# get from a synchronous grasp_request RPC, but as a fire-and-forget
# topic — useful for the legacy C++ piper_moveit_control subscriber
# which doesn't want to be a service client.
#
# atlas declares this so consumers can discover the endpoint
# (`/graspnet/grasps`) via contract id, but the topic name stays
# bytes-compatible with the legacy pipeline so the C++ subscriber
# needs zero changes.
[contract]
id      = "robonix/service/perception/grasp_pose/grasps"
version = "1"
kind    = "service"
idl     = "grasp/msg/GraspPose.msg"

[mode]
type = "topic_out"
