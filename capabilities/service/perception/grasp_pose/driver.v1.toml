# Lifecycle interface every perception/grasp_pose service implementation
# MUST declare. `rbnx boot` calls Driver(CMD_INIT, config_json) against
# this AFTER service/perception/object_detect (this service is a CLIENT
# of detect_object) and AFTER primitive/camera/{depth,camera_info}.
[contract]
id      = "robonix/service/perception/grasp_pose/driver"
version = "1"
kind    = "service"
idl     = "lifecycle/srv/Driver.srv"

[mode]
type = "rpc"
